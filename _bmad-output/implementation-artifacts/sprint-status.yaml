  # Epic 1 - Project Foundation
  epic-1:
    status: "completed"
    validation_note: "Implemented, re-reviewed, and revalidated on 2026-04-01 via pnpm test/lint/build, backend pytest/ruff, Alembic upgrade, runtime health checks, Vite proxy verification, pg_isready, and shell syntax checks. A follow-up Epic 1 review on 2026-04-03 found that fresh-clone backend bootstrap still depended on an undeclared JWT_SECRET, so `.env.example`, README bootstrap instructions, and backend CI were updated to seed/document that requirement explicitly. The Epic 1 review cycle also closed the restore-target asymmetry in Story 1.4, restored the shared backend deps scaffold for Story 1.2, made root/backend .env loading explicit for Stories 1.1 and 1.5, documented the full Alembic command surface for Story 1.7, and updated backend CI to provision PostgreSQL 17 and run Alembic before pytest for Story 1.3. Story 1.9 foundation hardening was re-reviewed and revalidated on 2026-04-17; the follow-up fixes added an explicit active-transaction guard for the public invoice collaborator, strengthened explicit registry coverage to the full mapped table surface, and added a post-invoice reservation-failure regression proving the confirmation workflow stays uncommitted in the focused test harness."
    stories:
      1-1-developer-environment-setup:
        status: "completed"
        story_id: "1.1"
        validation: "README/bootstrap flow documented and reconciled to pnpm 10.33.0 and PostgreSQL 18; root and backend .env loading now match the documented setup flow; follow-up review added explicit `.env.example` copy plus JWT secret bootstrap so fresh clones do not depend on ambient shell state; validation stack rerun clean"
      1-2-project-structure:
        status: "completed"
        story_id: "1.2"
        validation: "repository scaffold now exists with tracked placeholder directories, modular-monolith backend packages, and the shared backend app/deps.py scaffold restored"
      1-3-ci-cd-pipeline:
        status: "completed"
        story_id: "1.3"
        validation: "workflow pins pnpm 10.33.0, mirrors validated local commands, provisions PostgreSQL 18 for backend CI, runs Alembic before pytest, seeds JWT_SECRET for backend config/Alembic startup, and passes YAML diagnostics"
      1-4-cloud-backup-strategy:
        status: "completed"
        story_id: "1.4"
        validation: "backup scripts pass shell validation, enforce GPG recipient and checksum preconditions, normalize SQLAlchemy-style DATABASE_URL values for PostgreSQL CLI tools, and the restore script now targets the same normalized database semantics as backup"
      1-5-fastapi-backend-foundation:
        status: "completed"
        story_id: "1.5"
        validation: "FastAPI app, CORS, and health endpoint validated locally; backend settings now load documented root/backend .env files, including the required JWT secret bootstrap; backend pytest/ruff pass cleanly for the Epic 1 slice"
      1-6-react-frontend-foundation:
