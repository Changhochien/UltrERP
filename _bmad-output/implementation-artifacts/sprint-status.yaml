        status: "completed"
        story_id: "12.3"
        title: "eGUI Status Badge and State Persistence"
        story_file: "12-3-egui-status-badge.md"
        validation: "Validated on 2026-04-04 against the implemented repo: EguiSubmission persistence plus migration, concurrency-safe first-read creation, invalid-status-safe mock refresh behavior, invoice detail API enrichment, and the invoice detail eGUI badge, deadline, and refresh UI are all present. Deferred review follow-up also aligned invoice outstanding filters/sorts with the zero-clamped balances shown in UI, rejects mixed-currency customer outstanding aggregation with an explicit 409, and preserves backend error detail in the customer outstanding card; the focused backend payment-status suite and frontend customer-outstanding slice are green."
