/inventory/components/AnalyticsTab.test.tsx` (`1 passed`). The remaining Epic 20 stories still follow the validated draft ownership split: backend-only shared `product_analytics` foundation in v1, intelligence-owned diagnosis/performance/behavior, inventory-owned planning support, optional Story 20.2 only if Story 20.3 requires a conformed dimension, and no speculative public product-analytics silo."
