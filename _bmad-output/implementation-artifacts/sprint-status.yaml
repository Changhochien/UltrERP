        status: "completed"
        story_id: "12.4"
        title: "System Tray Mode with Notifications"
        story_file: "12-4-system-tray.md"
        validation: "Validated on 2026-04-04 against the implemented repo: the root Tauri shell now hides to tray on close, restores the existing window from tray click/menu actions, and exits only through an explicit quit path. Browser-safe desktop window/notification bridges and hidden eGUI transition monitoring reuse the Story 12.3 server-owned state source, suppress duplicate notifications locally, and degrade cleanly when notification permission is denied. Code-review follow-up hardened watcher session scoping, hidden-cycle cancellation/visibility rechecks, permanent-error eviction for inaccessible tracked invoices, and malformed local-state sanitization. Focused validation is green via cargo check, focused Vitest coverage for the new desktop bridge/monitor slices plus InvoiceDetail, and pnpm build; manual macOS/Windows hardware verification is documented in docs/superpowers/specs/2026-04-04-system-tray-mode.md."
        prerequisites: ["12-2-keyboard-shortcuts", "12-3-egui-status-badge"]
      12-5-print-preview-performance:
        status: "review"
        story_id: "12.5"
        title: "Print Preview Performance"
        story_file: "12-5-print-preview-performance.md"
        validation: "Validated on 2026-04-04 against the implemented repo: invoice detail now opens print preview through a real click-to-preview-ready path instrumented with the `ultrerp:invoice-print-preview-open` User Timing measure. The preview shell is lazy-loaded and prefetched, `InvoicePrintSheet` remains the single shared renderer, customer print payload is prepared ahead of modal mount through the existing customer detail API, a large-fixture preview modal test is in place, and the manual target-hardware performance recipe is documented in docs/superpowers/specs/2026-04-04-print-preview-performance.md. Code-review follow-up hardened preview-shell recovery, retry behavior, and timing-measure lifecycle. Frontend validation passed via focused preview tests plus `pnpm test`, `pnpm lint`, and `pnpm build`; actual target-hardware timing execution remains a manual review step rather than a completed automated proof."
        prerequisites: []

