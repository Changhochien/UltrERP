        status: "completed"
        story_id: "1.8"
        validation: "legacy migration findings consolidated into docs/legacy/migration-plan.md with corrected orphan profile and shadow-mode plan"
      1-9-backend-architecture-boundary-hardening:
        title: "Backend Architecture Boundary Hardening"
        status: "completed"
        story_id: "1.9"
        validation: "Validated on 2026-04-17 with `cd /Volumes/2T_SSD_App/Projects/UltrERP/backend && uv run pytest tests/common/test_model_registry.py tests/domains/orders/test_order_confirmation.py -q` (`19 passed in 2.29s`) and `cd /Volumes/2T_SSD_App/Projects/UltrERP/backend && uv run ruff check common/model_registry.py common/models/__init__.py ../migrations/env.py ../seed_user.py domains/orders/services.py domains/invoices/service.py domains/inventory/order_confirmation.py tests/common/test_model_registry.py tests/domains/orders/test_order_confirmation.py tests/domains/orders/_helpers.py` (all checks passed). Story 1.9 added an explicit ORM model registry, removed domain-owned ORM re-exports from `common.models`, promoted public in-transaction confirmation collaborators, and the review-fix pass added an explicit active-transaction guard, full-table registry coverage, and a post-invoice reservation-failure regression while preserving the atomic order-confirmation contract."
