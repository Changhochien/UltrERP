name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm lint

      - name: Test frontend
        run: pnpm test

      - name: Build frontend
        run: pnpm build
        env:
          CI: true

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ultr_erp
          POSTGRES_DB: ultr_erp
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ultr_erp -d ultr_erp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://ultr_erp@localhost:5432/ultr_erp
      JWT_SECRET: ci-test-secret-at-least-32-characters-long
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            backend/pyproject.toml
            backend/uv.lock

      - name: Sync backend dependencies
        run: uv sync

      - name: Lint backend
        run: uv run ruff check .

      - name: Run migrations
        run: uv run alembic -c ../migrations/alembic.ini upgrade head

      - name: Test backend
        run: uv run pytest
