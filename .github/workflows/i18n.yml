name: i18n Validation

on:
  push:
    paths:
      - 'public/locales/**'
      - 'scripts/**'
      - 'src/lib/i18n/**'
  pull_request:
    paths:
      - 'public/locales/**'
      - 'scripts/**'
      - 'src/lib/i18n/**'
  workflow_dispatch:

jobs:
  validate-translations:
    name: Validate Translations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate locale parity
        run: npx tsx scripts/i18n-validate.ts

      - name: Generate i18n types
        run: npx tsx scripts/generate-i18n-types.ts

      - name: Check for missing translations
        run: node scripts/i18n-check.ts

  test-translations:
    name: Run Translation Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run i18n tests
        run: pnpm test src/tests/i18n/i18n.test.ts --reporter=verbose

  report-coverage:
    name: Translation Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate coverage report
        run: npx tsx scripts/i18n-coverage.ts

      - name: Post coverage comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('./i18n-coverage-report.json', 'utf-8'));
            
            const coverage = report.locales.map(l => {
              const pct = ((l.translated / l.total) * 100).toFixed(1);
              return `| ${l.locale} | ${l.translated}/${l.total} | ${pct}% |`;
            }).join('\n');
            
            const body = `
            ## 📊 i18n Coverage Report
            
            | Locale | Translated | Coverage |
            |--------|------------|----------|
            ${coverage}
            
            ${report.issues.length > 0 ? `
            ### ⚠️ Issues Found
            
            ${report.issues.map(i => `- ${i.namespace}.${i.key}: ${i.message}`).join('\n')}
            ` : ''}
            
            *Generated at ${new Date().toISOString()}*
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
